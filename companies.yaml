# =====================================================================
# JobHunt Autopilot - configuration (v2.2)
# Everything you'd want to tune lives here. No code changes needed.
# =====================================================================
settings:
  request_timeout: 15           # seconds per source/JD/channel fetch
  search_text: "software engineer"
  max_alerts_per_run: 30        # flood protection
  repost_min_age_days: 15       # signature seen this long ago -> 🔁 REPOST
  alumni_keywords: ['"MANIT"', '"NIT Bhopal"']
  # used for links in the digest/dashboard when not running inside Actions
  repo_url: https://github.com/gopalverma416/jobhunt-autopilot
  # Optional LLM match scoring. Only runs if the GEMINI_API_KEY secret is set.
  gemini:
    model: gemini-2.0-flash     # free tier; also try gemini-2.5-flash
    timeout: 15

# Company aliases: brand name <-> ATS/company name used in contacts.csv.
# Both directions are handled (alias -> canonical, case-insensitive).
aliases:
  Eternal: Zomato
  Walmart: Walmart Global Tech

filters:
  # ---- title pass (v1) ----
  include_titles:
    - software engineer
    - software development engineer
    - sde
    - sde 1
    - sde-1
    - sde i
    - software developer
    - member of technical staff
    - associate engineer
    - graduate engineer
    - engineer i
    - engineer 1
    - new grad
    - university grad
    - early career
    - backend engineer
    - full stack
    - fullstack
    - associate software engineer
    - associate software developer
    - graduate software engineer
    - graduate software developer
    - software engineer i
    - software engineer 1
    - application engineer
    - systems engineer
    - member of engineering
    - software engineering associate
    - associate member of technical staff
    - mts
    - amts
    - graduate trainee engineer
  exclude_title_patterns:
    - '\bsenior\b'
    - '\bsr\.?\b'
    - '(?<!technical )\bstaff\b'   # blocks "Staff Engineer", allows "Member of Technical Staff"
    - '\bprincipa?le?\b'           # principal + the common "principle" typo
    - '\blead\b'
    - '\bmanager\b'
    - '\barchitect\b'
    - '\bdirector\b'
    - '\bintern(ship)?\b'
    - '\bhead\b'
    - '\bphd\b'                    # "SWE, PhD, Early Career" needs a PhD
    - '\bconsultant\b'             # consulting roles, not product SDE
    - '\b(ii|iii|iv|v)\b'          # roman-numeral levels
    - '[-–—/. ][23]\b'             # "SDE-2", "Engineer 3" (but not "2024")
    - '\b1[0-9]\+? ?(years|yrs)\b'
  locations_allow:
    - india
    - bengaluru
    - bangalore
    - hyderabad
    - pune
    - mumbai
    - gurugram
    - gurgaon
    - noida
    - new delhi
    - delhi
    - chennai
    - kolkata
    - ahmedabad
    - remote
    - hybrid
    - work from home
    - pan india
    - wfh
    - " in"
  allow_empty_location: true

  # ---- full-JD pass (Feature 1). Runs only for NEW jobs past the title filter. ----
  jd:
    hard_reject_years: 3       # "3+ years", "minimum of 3 years" -> reject
    borderline_years: 2        # "2+ years" -> 🤔 borderline (alerted, tagged)
    range_reject_min: 3        # "3-5 years" -> reject
    range_borderline_min: 2    # "2-4 years" -> 🤔 borderline
    extra_reject_patterns: []  # your own regexes, e.g. '\bphd required\b'
    fresher_patterns:          # any match -> ✅ fresher-friendly tag
      - '\bfreshers?\b'
      - '\bentry.?level\b'
      - '\bnew ?grad(uate)?s?\b'
      - '\brecent graduates?\b'
      - '\bgraduate engineer\b'
      - '\bgraduate trainee\b'
      - '\bassociate software engineer\b'
      - '\bsoftware engineer i\b'
      - '\b202[4567]\s*(batch|grad)'
      - '\b0\s*(?:-|–|to)\s*[12]\s*years?\b'
      - '\bcampus\b'

# ---- Telegram job channels (Feature 3) ----
# Public channels polled via https://t.me/s/<name> (no account needed).
# The run log prints "CHAN <name>: N msgs" per channel, or a warning if a
# channel has web previews disabled (those can't be polled - swap them out).
telegram_channels:
  - offcampusjobsindia_IT
  - Fresherjobsadda
  - offcampusjobs4u
  - offcampusjobsindia
  - freshersnowjobs
  - freshers_job_openings
  - freshershunt
  - jobsforfreshers
  - softwarejobsindia
  - placementdrive
  - engineeringjobs
  - techjobsindia

# A channel message is forwarded only if it contains BOTH a role keyword
# (filters.include_titles above) AND one of these fresher signals.
# NEVER put role words (sde/developer/...) here - that disables the 2nd gate.
channel_fresher_signals:
  - fresher          # also matches "freshers"
  - 2025 batch
  - 2026 batch
  - 2027 batch
  - off campus
  - off-campus
  - campus hiring
  - campus drive
  - graduate engineer
  - graduate trainee
  - 0-1 year
  - 0 to 1 year
  - 0 years
  - entry level
  - new grad
  - walk-in
  - walkin
  - drive

