# =====================================================================
# JobHunt Autopilot - configuration
# Everything you'd want to tune lives here. No code changes needed.
# =====================================================================

settings:
  # Seconds before giving up on a single source. Keep small so the
  # whole run stays under ~1 minute on GitHub Actions.
  request_timeout: 10
  # Search text sent to sources that support server-side search
  # (Workday, Amazon, Microsoft, Google).
  search_text: "software engineer"
  # Max Telegram alerts per run (safety valve against alert floods).
  max_alerts_per_run: 15
  # Your college names, used to build the LinkedIn alumni search link.
  alumni_keywords: ['"MANIT"', '"NIT Bhopal"']

filters:
  # Alert only if the title matches AT LEAST ONE of these
  # (case-insensitive, matched as whole words/phrases).
  include_titles:
    - software engineer
    - software development engineer
    - sde
    - sde 1
    - sde-1
    - sde i
    - software developer
    - member of technical staff
    - associate engineer
    - graduate engineer
    - engineer i
    - engineer 1
    - new grad
    - university grad
    - early career
    - backend engineer
    - full stack
    - fullstack

  # ...and matches NONE of these. These are Python regexes
  # (case-insensitive). \b = word boundary, so "SDE-1" passes
  # while "SDE-2", "Engineer II", "Senior SWE" all fail.
  exclude_title_patterns:
    - '\bsenior\b'
    - '\bsr\.?\b'
    - '(?<!technical )\bstaff\b'   # blocks "Staff Engineer", allows "Member of Technical Staff"
    - '\bprincipal\b'
    - '\blead\b'
    - '\bmanager\b'
    - '\barchitect\b'
    - '\bdirector\b'
    - '\bintern(ship)?\b'
    - '\bhead\b'
    - '\b(ii|iii|iv|v)\b'          # roman-numeral levels
    - '[-–—/. ][23]\b'             # "SDE-2", "Engineer 3" (but not "2024")
    - '\b1[0-9]\+? ?(years|yrs)\b' # "10+ years" sneaking into titles

  # Location must contain one of these tokens (case-insensitive)...
  locations_allow:
    - india
    - bengaluru
    - bangalore
    - hyderabad
    - pune
    - mumbai
    - gurugram
    - gurgaon
    - noida
    - new delhi
    - delhi
    - chennai
    - kolkata
    - ahmedabad
    - remote
    - " in"        # matches "Bengaluru, KA, IN"
  # ...or be empty (some global-remote posts have no location).
  allow_empty_location: true

# ---------------------------------------------------------------------
# Companies. Every entry was verified live on 2026-07-12 (see README
# "Verification log"). ats must be one of:
#   greenhouse | lever | ashby | smartrecruiters | workday
#   | amazon | microsoft | atlassian | google_html
# ---------------------------------------------------------------------
