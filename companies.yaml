# =====================================================================
# JobHunt Autopilot - configuration (v2)
# Everything you'd want to tune lives here. No code changes needed.
# =====================================================================

settings:
  request_timeout: 10           # seconds per source/JD/channel fetch
  search_text: "software engineer"
  max_alerts_per_run: 15        # flood protection
  repost_min_age_days: 21       # signature seen this long ago -> 🔁 REPOST
  alumni_keywords: ['"MANIT"', '"NIT Bhopal"']
  # used for links in the digest/dashboard when not running inside Actions
  repo_url: https://github.com/gopalverma416/jobhunt-autopilot

# Company aliases: brand name <-> ATS/company name used in contacts.csv.
# Both directions are handled (alias -> canonical, case-insensitive).
aliases:
  Eternal: Zomato
  Walmart: Walmart Global Tech

filters:
  # ---- title pass (v1, unchanged) ----
  include_titles:
    - software engineer
    - software development engineer
    - sde
    - sde 1
    - sde-1
    - sde i
    - software developer
    - member of technical staff
    - associate engineer
    - graduate engineer
    - engineer i
    - engineer 1
    - new grad
    - university grad
    - early career
    - backend engineer
    - full stack
    - fullstack

  exclude_title_patterns:
    - '\bsenior\b'
    - '\bsr\.?\b'
    - '(?<!technical )\bstaff\b'   # blocks "Staff Engineer", allows "Member of Technical Staff"
    - '\bprincipal\b'
    - '\blead\b'
    - '\bmanager\b'
    - '\barchitect\b'
    - '\bdirector\b'
    - '\bintern(ship)?\b'
    - '\bhead\b'
    - '\bphd\b'                    # "SWE, PhD, Early Career" needs a PhD
    - '\bconsultant\b'             # consulting roles, not product SDE
    - '\b(ii|iii|iv|v)\b'          # roman-numeral levels
    - '[-–—/. ][23]\b'             # "SDE-2", "Engineer 3" (but not "2024")
    - '\b1[0-9]\+? ?(years|yrs)\b'

  locations_allow:
    - india
    - bengaluru
    - bangalore
    - hyderabad
    - pune
    - mumbai
    - gurugram
    - gurgaon
    - noida
    - new delhi
    - delhi
    - chennai
    - kolkata
    - ahmedabad
    - remote
    - " in"
  allow_empty_location: true

  # ---- full-JD pass (v2, Feature 1) ----
  # Runs only for NEW jobs that already passed the title filter.
  jd:
    hard_reject_years: 3       # "3+ years", "minimum of 3 years" -> reject
    borderline_years: 2        # "2+ years" -> 🤔 borderline (alerted, tagged)
    range_reject_min: 3        # "3-5 years" -> reject
    range_borderline_min: 2    # "2-4 years" -> 🤔 borderline
    extra_reject_patterns: []  # your own regexes, e.g. '\bphd required\b'
    fresher_patterns:          # any match -> ✅ fresher-friendly tag
      - '\bfreshers?\b'
      - '\bnew ?grad(uate)?s?\b'
      - '\brecent graduates?\b'
      - '\b202[456]\s*(batch|grad)'
      - '\b0\s*(?:-|–|to)\s*[12]\s*years?\b'
      - '\bentry.?level\b'
      - '\bcampus\b'

# ---- Telegram job channels (v2, Feature 3) ----
# Public channels polled via https://t.me/s/<name> (no account needed).
# FILL THESE IN YOURSELF: pick 3-6 Indian fresher-hiring channels you trust
# (the exact @names from Telegram, without the @). Then run
#   python watcher.py --dry-run
# once - the log prints "CHAN <name>: N msgs" per channel, or a warning if
# the channel has web previews disabled (those can't be polled).
telegram_channels: []
#  - your_channel_name_here
#  - another_channel

# A channel message is forwarded only if it contains BOTH a role keyword
# (filters.include_titles above) AND one of these fresher signals:
channel_fresher_signals:
  - fresher
  - 2025 batch
  - 2026 batch
  - off campus
  - off-campus
  - 0-1 year
  - walk-in
  - walkin
  - drive

