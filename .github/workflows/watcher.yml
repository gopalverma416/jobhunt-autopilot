# Job watcher - runs every 4 hours (quality over speed, by design).
# Minute 17 (not :00) = "jitter": GitHub's queues are least congested off the
# hour, so delays are smaller. GitHub cron can still lag 10-30 min at peak.
#
# Budget maths: private repos get 2,000 free minutes/month.
# 6 runs/day x ~2 min x 31 days ≈ 370 min/month - tons of headroom, which lets
# each run do heavier quality work (score every job, deeper JD checks, more
# sources). The per-run state commit keeps the repo "active" so GitHub's
# 60-day auto-disable of scheduled workflows never kicks in.
name: watcher

on:
  schedule:
    - cron: "17 */4 * * *"   # 01:17, 05:17, 09:17, 13:17, 17:17, 21:17 UTC
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write         # needed to commit seen_jobs.json / tracker.csv

concurrency:
  group: jobhunt-state    # never let two runs race on the state files
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5    # hard stop: a hung run must not eat minutes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python watcher.py

      - name: Commit state (dedupe + tracker)
        run: |
          git config user.name "jobhunt-bot"
          git config user.email "jobhunt-bot@users.noreply.github.com"
          git add seen_jobs.json tracker.csv rejected_log.csv DASHBOARD.md 2>/dev/null || true
          git add seen_jobs.json tracker.csv
          if git diff --cached --quiet; then
            echo "no state changes"
          else
            git commit -m "state: watcher $(date -u '+%Y-%m-%d %H:%M UTC')"
            # you may have edited tracker.csv on the web UI mid-run:
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push
          fi
