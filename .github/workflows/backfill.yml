# One-time (re-runnable) JD backfill: re-checks all 'found' tracker rows
# against the full-JD filter. Trigger manually from the Actions tab.
name: jd-backfill

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: jobhunt-state
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Re-check found jobs against JD filter
        run: python backfill_jd.py

      - name: Commit results
        run: |
          git config user.name "jobhunt-bot"
          git config user.email "jobhunt-bot@users.noreply.github.com"
          git add tracker.csv rejected_log.csv DASHBOARD.md 2>/dev/null || git add tracker.csv DASHBOARD.md
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "backfill: JD re-check of found jobs"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push
          fi
