# Weekly analytics report - Sunday 03:30 UTC = 9:00 AM IST Sunday.
name: weekly-report

on:
  schedule:
    - cron: "30 3 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write      # commits reports/YYYY-WW.md

concurrency:
  group: jobhunt-state
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build + send report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python analytics.py

      - name: Commit report
        run: |
          git config user.name "jobhunt-bot"
          git config user.email "jobhunt-bot@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "no report changes"
          else
            git commit -m "report: week $(date -u +%G-W%V)"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push
          fi
